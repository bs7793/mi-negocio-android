name: Contracts Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify contracts and debug build
        shell: pwsh
        run: ./scripts/verify-contracts.ps1
